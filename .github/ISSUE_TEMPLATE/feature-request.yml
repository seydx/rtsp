name: Feature Request
description: Suggest a feature or improvement for @seydx/rtsp
title: 'Feature: '
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please search the existing issues first to avoid duplicates.

  - type: textarea
    attributes:
      label: Problem
      description: What are you trying to do, and what is missing or awkward with the current API?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed solution
      description: How you would like this to work. Include example code if it helps.
      render: typescript
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you have tried.
    validations:
      required: false
