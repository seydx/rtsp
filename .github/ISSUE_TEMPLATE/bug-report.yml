name: Bug Report
description: Report a bug in @seydx/rtsp
title: 'Bug: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search the existing issues first to avoid duplicates.

        Note: all codec, demuxing and muxing work is handled by [node-av](https://github.com/seydx/node-av). If the problem is a decode/encode failure rather than relay behaviour, it may belong there.

  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: A minimal code sample and the steps needed to trigger the bug. Include the source/sink setup and, if relevant, the camera or stream type.
      render: typescript
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behaviour
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Logs
      description: Any relevant error messages or stack traces. Pass a logger to the relay to capture diagnostics.
      render: shell
    validations:
      required: false

  - type: input
    attributes:
      label: '@seydx/rtsp version'
      placeholder: 0.0.1
    validations:
      required: true

  - type: input
    attributes:
      label: node-av version
      placeholder: 6.0.0
    validations:
      required: true

  - type: input
    attributes:
      label: Node.js version
      placeholder: 22.x
    validations:
      required: true

  - type: input
    attributes:
      label: Operating system
      placeholder: macOS 14 / Ubuntu 22.04 / Windows 11
    validations:
      required: true
