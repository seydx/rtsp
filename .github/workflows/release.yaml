name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run type-check:examples
      - run: npm run build
      - run: npm test

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - run: npm ci --ignore-scripts

      - run: npm run build

      - name: Determine npm dist-tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_NAME#v}" == *"-beta."* ]]; then
            echo "dist=beta" >> "$GITHUB_OUTPUT"
          else
            echo "dist=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: |
          npm install -g npm@11.18.0
          npm publish --provenance --access public --tag "${{ steps.tag.outputs.dist }}" --ignore-scripts

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NO_V="${VERSION#v}"
          : > release_notes.md

          if [[ "$VERSION_NO_V" == *"-beta."* ]]; then
            echo "> Pre-release for testing. Install with: \`npm install @seydx/rtsp@beta\`" >> release_notes.md
            echo "" >> release_notes.md
          elif [ -f CHANGELOG.md ]; then
            SECTION=$(sed -n "/## \[${VERSION_NO_V}\]/,/## \[/p" CHANGELOG.md | sed '$d')
            if [ -n "$SECTION" ]; then
              echo "$SECTION" | tail -n +2 >> release_notes.md
              echo "" >> release_notes.md
            fi
          fi

          PREV_TAG=$(git tag -l 'v*' | grep -v -- '-beta\.' | sort -V | grep -v "^${VERSION}$" | tail -1)
          if [ -n "$PREV_TAG" ]; then
            echo "### Changes since $PREV_TAG" >> release_notes.md
            echo "" >> release_notes.md
            # Prefer the GitHub API so each commit is credited to its @user; fall back to git log.
            CHANGES=$(gh api --paginate "repos/${{ github.repository }}/compare/${PREV_TAG}...${VERSION}" \
              --jq '.commits[] | "- \(.commit.message | split("\n")[0]) (\(.sha[:7])) - \(if .author then "@\(.author.login)" else (.commit.author.name | if test("^[A-Za-z0-9-]+$") then "@\(.)" else . end) end)"' 2>/dev/null | tac)
            if [ -n "$CHANGES" ]; then
              echo "$CHANGES" >> release_notes.md
            else
              git log --pretty=format:"- %s (%h) - %an" "${PREV_TAG}..${VERSION}" >> release_notes.md
            fi
            echo "" >> release_notes.md
          fi

          cat release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          prerelease: ${{ steps.tag.outputs.dist == 'beta' }}
