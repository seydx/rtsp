name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run type-check:examples
      - run: npm run build
      - run: npm test

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - run: npm ci --ignore-scripts

      - run: npm run build

      - name: Determine npm dist-tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_NAME#v}" == *"-beta."* ]]; then
            echo "dist=beta" >> "$GITHUB_OUTPUT"
          else
            echo "dist=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: |
          npm install -g npm@latest
          npm publish --provenance --access public --tag "${{ steps.tag.outputs.dist }}" --ignore-scripts
